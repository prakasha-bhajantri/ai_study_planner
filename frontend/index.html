<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Management App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>
            <h1>📚 AI Study Management App</h1>
            <p>Plan Smarter. Study Better.</p>
        </header>

        <div class="top-section">

            <!-- Create Study Goal -->

            <div class="card">

                <h2>Create Study Goal</h2>

                <label>Subject</label>
                <input type="text" id="subject" placeholder="Psychology">

                <label>Total Study Hours</label>
                <input type="number" id="hours" placeholder="6">

                <label>Exam Date</label>
                <input type="date" id="examDate">

                <label>Difficulty</label>
                <select id="difficulty">
                    <option>Easy</option>
                    <option>Medium</option>
                    <option>Hard</option>
                </select>

                <label>Preferred Slot</label>
                <select id="slot">
                    <option>Morning</option>
                    <option>Afternoon</option>
                    <option>Evening</option>
                </select>

                <button onclick="generatePlan()">
                    Generate Study Plan
                </button>

            </div>

            <!-- Dashboard -->

            <div class="card">

                <h2>Dashboard</h2>

                <div class="dashboard-item">
                    <span>Subjects</span>
                    <strong id="subjectsCount">0</strong>
                </div>

                <div class="dashboard-item">
                    <span>Planned Hours</span>
                    <strong id="plannedHours">0</strong>
                </div>

                <div class="dashboard-item">
                    <span>Completed Hours</span>
                    <strong id="completedHours">0</strong>
                </div>

                <div class="dashboard-item">
                    <span>Progress</span>
                    <strong id="progress">0%</strong>
                </div>

            </div>

        </div>

        <!-- AI Recommendations -->

        <div class="card">

            <h2>🤖 AI Recommendations</h2>

            <div id="recommendations">

                <div class="recommendation-item">
                    Create a study goal to get recommendations.
                </div>

            </div>

        </div>

        <!-- Generated Plan -->

        <div class="card">

            <h2>📅 Generated Study Plan</h2>

            <div id="planContainer">

                No study plan generated.

            </div>

        </div>

        <!-- Task Tracker -->

        <div class="card">

            <h2>✅ Task Tracker</h2>

            <div id="taskTracker">

                No tasks available.

            </div>

        </div>

    </div>

    <script>

        const API_BASE = "http://localhost:8000";

        async function generatePlan() {

            const payload = {

                subject: document.getElementById("subject").value,

                total_hours: parseInt(
                    document.getElementById("hours").value
                ),

                difficulty:
                    document.getElementById("difficulty").value,

                preferred_slot:
                    document.getElementById("slot").value,

                exam_date:
                    document.getElementById("examDate").value
            };

            try {

                const response = await fetch(
                    `${API_BASE}/generate-plan`,
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(payload)
                    }
                );

                const data = await response.json();

                console.log(data);

                renderStudyPlan(data.plan);

                await loadDashboard();
                await loadTasks();
                await loadRecommendations();

            }
            catch (error) {

                console.error(error);

                alert(
                    "Unable to connect to backend API."
                );

            }
        }

        function renderStudyPlan(plan) {

            let html = "";

            plan.forEach(item => {

                html += `

                    <div class="plan-item">

                        <h4>Day ${item.day}</h4>

                        <p>
                            <strong>Subject:</strong>
                            ${item.subject}
                        </p>

                        <p>
                            <strong>Hours:</strong>
                            ${item.hours}
                        </p>

                        <p>
                            <strong>Difficulty:</strong>
                            ${item.difficulty}
                        </p>

                        <p>
                            <strong>Preferred Slot:</strong>
                            ${item.preferred_slot}
                        </p>

                    </div>

                `;
            });

            document.getElementById(
                "planContainer"
            ).innerHTML = html;
        }

        async function loadDashboard() {

            try {

                const response =
                    await fetch(
                        `${API_BASE}/dashboard`
                    );

                const data =
                    await response.json();

                document.getElementById(
                    "subjectsCount"
                ).innerText = data.subjects;

                document.getElementById(
                    "plannedHours"
                ).innerText = data.planned_hours;

                document.getElementById(
                    "completedHours"
                ).innerText = data.completed_hours;

                document.getElementById(
                    "progress"
                ).innerText = data.progress + "%";

            }
            catch (error) {

                console.error(
                    "Dashboard Error",
                    error
                );

            }
        }

        async function loadTasks() {

            try {

                const response =
                    await fetch(
                        `${API_BASE}/tasks`
                    );

                const tasks =
                    await response.json();

                let html = "";

                tasks.forEach(task => {

                    html += `

                        <div class="task-item">

                            <input
                                type="checkbox"
                                ${task.status === "completed"
                            ? "checked"
                            : ""}
                                onchange="updateTask(${task.id})">

                            <span>

                                <strong>
                                    ${task.subject}
                                </strong>

                                | Day ${task.day}

                                | ${task.hours} hrs

                                | ${task.status}

                            </span>

                        </div>

                    `;
                });

                document.getElementById(
                    "taskTracker"
                ).innerHTML = html;

            }
            catch (error) {

                console.error(
                    "Task Error",
                    error
                );

            }
        }

        async function updateTask(taskId) {

            try {

                const response =
                    await fetch(
                        `${API_BASE}/tasks/${taskId}`,
                        {
                            method: "PATCH"
                        }
                    );

                const data =
                    await response.json();

                console.log(data);

                await loadTasks();
                await loadDashboard();
                await loadRecommendations();

            }
            catch (error) {

                console.error(
                    "Task Update Error",
                    error
                );

            }
        }

        async function loadRecommendations() {

            try {

                const response =
                    await fetch(
                        `${API_BASE}/recommendations`
                    );

                const data =
                    await response.json();

                let html = "";

                data.recommendations.forEach(rec => {

                    html += `
                        <div class="recommendation-item">
                            ${rec}
                        </div>
                    `;

                });

                document.getElementById(
                    "recommendations"
                ).innerHTML = html;

            }
            catch (error) {

                console.error(
                    "Recommendation Error",
                    error
                );

            }
        }

        // Initial Load

        loadDashboard();
        loadTasks();
        loadRecommendations();

    </script>

</body>

</html>
